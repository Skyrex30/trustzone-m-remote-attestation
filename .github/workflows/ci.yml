name: STM32 CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: sudo apt-get install -y build-essential gcc-arm-none-eabi
      - name: Build Secure world
        run: |
        cd Secure
        make all  # or your IDE build command for secure
      - name: Build NonSecure world
        run: |
        cd ../NonSecure
        make all  # or IDE build command for non-secure
