name: STM32 CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: sudo apt-get install -y build-essential gcc-arm-none-eabi
      - name: Build Secure world
        run: |
          /opt/stm32cubeide/stm32cubeide -nosplash -application org.eclipse.cdt.managedbuilder.core.headlessbuild \
            -data $GITHUB_WORKSPACE/workspace \
            -import $GITHUB_WORKSPACE/Secure \
            -build "Secure/Release"

      - name: Build NonSecure world
        run: |
          /opt/stm32cubeide/stm32cubeide -nosplash -application org.eclipse.cdt.managedbuilder.core.headlessbuild \
            -data $GITHUB_WORKSPACE/workspace \
            -import $GITHUB_WORKSPACE/NonSecure \
            -build "NonSecure/Release"
